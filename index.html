<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tic Tac Toe</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="msg-container hide">
    <h2 id="msg"></h2>
    <img src="win.gif" class="gif" id="resultGif">
    <button id="new-btn">Play Again</button>
    </div>

    <main>

        <h1>Tic Tac Toe</h1>

        <p id="status">Player O Turn</p>

        <div class="container">
            <div class="game">

                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>

                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>

                <button class="box"></button>
                <button class="box"></button>
                <button class="box"></button>

            </div>
        </div>

        <button class="btn">Reset Game</button>

    </main>

<script src="script.js"></script>

</body>
</html>
